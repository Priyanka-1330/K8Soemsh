apiVersion: v1
kind: pod
metadata:
  name: nppod
  labels: 
    app: nppod
spec:
  containers:
  - name: httpd-cont
    image: httpd:latest
    ports:
    -  name: httpd-container
       image: httpd:latest
       ports:
       -  name: httpdport
          containerPort: 80
...
---
apiVersion: v1
kind: service
metadata:
  name: nppod
spec:
  type: NodePort
  selector:
    app: nppod
  ports:
  -  name: httpdsvc-port
     protocol: TCP
     port: 80
     targetport: 80