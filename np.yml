apiVersion: v1
kind: Pod
metadata:
  name: nppod
  labels:
    app: nppod

spec:
  containers:
    - name: httpd-cont
      image: httpd:latest
      ports:
        - name: httpdport
          containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nppod

spec:
  type: NodePort
  selector:
    app: nppod
  ports:
    - name: httpdsvc-port
      protocol: TCP
      port: 80
      targetPort: 80